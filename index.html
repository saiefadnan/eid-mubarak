<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ঈদ মোবারক | Saief Md. Adnan</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@700&family=Hind+Siliguri:wght@700&family=Baloo+Da+2:wght@700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="eid-header">
        <img src="eid-moon.png" alt="Eid Moon" class="eid-moon main" />
        <img
          src="balloon.png"
          alt="Balloons"
          class="balloon left-balloon big"
        />
        <img
          src="balloon.png"
          alt="Balloons"
          class="balloon right-balloon big"
        />
      </div>
      <h2>সাইফ মোঃ আদনান-এর পক্ষ থেকে</h2>
      <div class="rhyme">
        <p>ঈদের চাঁদ আকাশে, সালামি দিন বিকাশে।</p>
        <p>হাসি মুখে আসুক সবাই, আনন্দে ভরে উঠুক হৃদয়।</p>
        <p>বন্ধু-স্বজন, সবাই মিলে, ঈদের খুশি ভাগ করে নিলে।</p>
      </div>
      <div class="qr-section">
        <p>বিকাশে সালামি পাঠাতে চাইলে, নিচের QR কোডটি স্ক্যান করুন:</p>
        <img id="qr" src="qr.png" alt="bKash QR Code" />
        <a href="qr.png" download="eid-bkash-qr.png" class="download-qr-btn"
          >QR কোড ডাউনলোড করুন</a
        >
        <div class="visitor-count" id="visitor">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            style="vertical-align: middle; margin-right: 4px"
          >
            <path
              d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12Z"
              stroke="#ad1457"
              stroke-width="2"
              fill="#fff"
            />
            <circle cx="12" cy="12" r="3.5" fill="#ad1457" />
          </svg>
          <span id="visitorCount">—</span>
        </div>
      </div>
      <button id="confettiBtn" class="floating-confetti">
        আনন্দের কনফেটি!
      </button>
      <canvas id="confetti"></canvas>
    </div>
    <footer>
      <p>© ২০২৬ সাইফ মোঃ আদনান | ঈদ মোবারক</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
